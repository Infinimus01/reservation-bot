services:
  availability-checker:
    build:
      context: .
      dockerfile: Dockerfile.availability
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override if needed; these come from .env by default
      AVAILABILITY_CHECKER_POLL_INTERVAL_SECONDS: ${AVAILABILITY_CHECKER_POLL_INTERVAL_SECONDS:-60}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/app/logs
      - ./availability_runs:/app/availability_runs
      - ./local_debug:/app/local_debug
      - ./proxies.txt:/app/proxies.txt:ro
