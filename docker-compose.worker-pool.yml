services:
  worker-a:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: always
    env_file:
      - .env
    environment:
      WORKER_ID: worker-a
      WORKER_NAME: worker-a
      WORKER_MAX_TASKS: 3
      RABBITMQ_WORKER_PREFETCH_COUNT: 3
    command: ["python", "-m", "worker.worker_main"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/app/logs
      - ./screenshots:/app/screenshots
      - ./proxies.txt:/app/proxies.txt:ro

